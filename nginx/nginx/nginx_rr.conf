# ─────────────────────────────────────────────────────────────
#  Round-Robin Load Balancer
#
#  Nginx distributes incoming requests evenly across three Flask
#  workers using the default round-robin algorithm.
#
#  Request flow:
#    Client → Nginx :80 → flask_1 :5000
#                       → flask_2 :5000  (next request)
#                       → flask_3 :5000  (next request)
#                       → flask_1 :5000  (wraps back)  …
# ─────────────────────────────────────────────────────────────

upstream flask_rr {
    # Round-robin is nginx's default — no extra directive needed,
    # but it is shown here for clarity.
    # Alternatives: least_conn; / ip_hash; / random;

    # Passive health check — skip a backend after 3 failures,
    # retry it after 30 s:
    server flask_1:5000 max_fails=3 fail_timeout=30s;
    server flask_2:5000 max_fails=3 fail_timeout=30s;
    server flask_3:5000 max_fails=3 fail_timeout=30s;

    # Weighted round-robin example (flask_1 gets 3× more traffic):
    #   server flask_1:5000 weight=3;
    #   server flask_2:5000 weight=1;
    #   server flask_3:5000 weight=1;

    # Mark a backend down without removing it:
    #   server flask_2:5000 down;
}

server {
    listen 80;
    server_name localhost;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Proxy headers defined at server level so every location inherits them.
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 90s;

    # Inject a response header so the client can see which
    # upstream server handled the request.
    add_header X-Upstream-Server $upstream_addr always;

    location / {
        proxy_pass http://flask_rr;

        # Do not retry POST / PATCH / PUT on failure.
        proxy_next_upstream error timeout http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    location /health {
        proxy_pass http://flask_rr/health;
        access_log off;
    }
}
