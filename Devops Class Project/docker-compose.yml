version: '3.8'

services:
  # SonarQube Service
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:h2:tcp://localhost:9092/sonar
      SONAR_JDBC_USERNAME: sa
      SONAR_JDBC_PASSWORD: sa
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - houseprice-network

  # Development Database (PostgreSQL)
  postgres:
    image: postgres:13-alpine
    container_name: houseprice-postgres
    environment:
      POSTGRES_USER: housepriceuser
      POSTGRES_PASSWORD: housepricepwd
      POSTGRES_DB: houseprice_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U housepriceuser"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - houseprice-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: houseprice-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - houseprice-network

  # DEV Application
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: houseprice-dev
    ports:
      - "5001:5000"
    environment:
      FLASK_ENV: development
      LOG_LEVEL: DEBUG
      DATABASE_URL: postgresql://housepriceuser:housepricepwd@postgres:5432/houseprice_db
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    networks:
      - houseprice-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # QA Application
  app-qa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: houseprice-qa
    ports:
      - "5002:5000"
    environment:
      FLASK_ENV: testing
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql://housepriceuser:housepricepwd@postgres:5432/houseprice_db
      REDIS_URL: redis://redis:6379/1
      ENVIRONMENT: qa
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - houseprice-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # UAT Application
  app-uat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: houseprice-uat
    ports:
      - "5003:5000"
    environment:
      FLASK_ENV: uat
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql://housepriceuser:housepricepwd@postgres:5432/houseprice_db
      REDIS_URL: redis://redis:6379/2
      ENVIRONMENT: uat
      REQUIRE_AUTH: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - houseprice-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus for Monitoring (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: houseprice-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - houseprice-network

  # Grafana for Visualization (Optional)
  grafana:
    image: grafana/grafana:latest
    container_name: houseprice-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - houseprice-network

volumes:
  postgres_data:
  redis_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  prometheus_data:
  grafana_data:

networks:
  houseprice-network:
    driver: bridge

# Usage:
# docker-compose up -d          # Start all services
# docker-compose down           # Stop all services
# docker-compose logs -f        # View logs
# docker-compose ps             # Check status
# docker-compose build --no-cache app-dev  # Rebuild service
