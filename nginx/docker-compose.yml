services:
  flask_1:
    build: ./app
    container_name: flask_1
    restart: unless-stopped
    expose:
      - "5000"
    networks:
      - app_network

  flask_2:
    build: ./app
    container_name: flask_2
    restart: unless-stopped
    expose:
      - "5000"
    networks:
      - app_network

  flask_3:
    build: ./app
    container_name: flask_3
    restart: unless-stopped
    expose:
      - "5000"
    networks:
      - app_network

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx_rr.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - flask_1
      - flask_2
      - flask_3
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
