trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageName: flask-app

stages:

# ---------------------------
# STAGE 1: Build Docker Image
# ---------------------------
- stage: Build
  displayName: Build Docker Image
  jobs:
  - job: BuildJob
    steps:

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'

