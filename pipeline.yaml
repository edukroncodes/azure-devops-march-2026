  displayName: Run Container and Test
  dependsOn: Build
  jobs:
  - job: RunJob
    steps:

    - script: |
        docker run -d -p 5000:5000 $(imageName)
      displayName: Run Container

    - script: |
        sleep 10
        curl http://localhost:5000
      displayName: Test Application


