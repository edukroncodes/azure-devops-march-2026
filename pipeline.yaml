trigger:
- main

resources:
- repo: self

variables:
  dockerRegistryServiceConnection: 'b85a7a9b-c643-46c3-9054-ad653f551268'
  imageRepository: 'testproject'
  containerRegistry: 'ecommerceproject.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'
  vmImageName: 'ubuntu-latest'

stages:

# =====================================================
# STAGE 1: TEST
# =====================================================
- stage: Test
  displayName: Run Unit Tests
  jobs:
  - job: TestJob
    pool:
      vmImage: $(vmImageName)

    steps:

    # 1. Checkout code
    - checkout: self

    # 2. Use Python
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'

    # 3. Upgrade pip
    - script: python -m pip install --upgrade pip
      displayName: Upgrade pip

    # 4. Install dependencies + pytest
    - script: |
        pip install -r requirements.txt
        pip install pytest
      displayName: Install Dependencies

    # 5. Verify pytest
    - script: |
        which pytest
        pytest --version
      displayName: Verify Pytest

    # 6. List files
    - script: ls -la
      displayName: List Project Files

    # 7. Run unit tests
    - script: pytest --junitxml=test-results.xml
      displayName: Run Unit Tests

    # 8. Publish test results
    - task: PublishTestResults@2
      inputs:
        testResultsFiles: 'test-results.xml'
        testRunTitle: 'Flask Unit Tests'
      condition: succeededOrFailed()

    # 9. Print test results
    - script: cat test-results.xml
      displayName: Print Test Results

    # 10. Validate test report
    - script: |
        if [ -f test-results.xml ]; then
          echo "Test results found"
        else
          echo "Test results missing"
          exit 1
        fi
      displayName: Validate Test Report


# =====================================================
# STAGE 2: BUILD & PUSH DOCKER IMAGE
# =====================================================
- stage: Build
  displayName: Build and Push Image
  dependsOn: Test
  condition: succeeded()

  jobs:
  - job: BuildJob
    pool:
      vmImage: $(vmImageName)

    steps:

    # 11. Checkout
    - checkout: self

    # 12. Check Docker version
    - script: docker --version
      displayName: Check Docker Version

    # 13. List files
    - script: ls -la
      displayName: Verify Files

    # 14. Build Docker image
    - script: docker build -t $(imageRepository):$(tag) .
      displayName: Build Docker Image

    # 15. List images
    - script: docker images
      displayName: List Docker Images

    # 16. Push image to ACR
    - task: Docker@2
      displayName: Build and Push Image to ACR
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)

    # 17. Confirm push
    - script: echo "Image pushed to ACR successfully"
      displayName: Confirm Push


# =====================================================
# STAGE 3: RUN & VALIDATE CONTAINER
# =====================================================
- stage: Run
  displayName: Run and Validate App
  dependsOn: Build

  jobs:
  - job: RunJob
    pool:
      vmImage: $(vmImageName)

    steps:

    # 18. Pull image
    - script: |
        docker pull $(containerRegistry)/$(imageRepository):$(tag)
      displayName: Pull Image

    # 19. Run container
    - script: |
        docker run -d -p 5000:5000 $(containerRegistry)/$(imageRepository):$(tag)
      displayName: Run Container

    # 20. Check containers
    - script: docker ps
      displayName: Check Running Containers

    # 21. Check logs
    - script: docker logs $(docker ps -q)
      displayName: Check Logs

    # 22. Wait for startup
    - script: sleep 20
      displayName: Wait for App Startup

    # 23. Test application
    - script: curl http://localhost:5000
      displayName: Test Application

    # 24. Validate HTTP response
    - script: |
        STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:5000)
        if [ "$STATUS" -eq 200 ]; then
          echo "Application is UP"
        else
          echo "Application FAILED"
          exit 1
        fi
      displayName: Validate Application



