trigger:
- main

resources:
- repo: self

variables:
  dockerRegistryServiceConnection: 'b85a7a9b-c643-46c3-9054-ad653f551268'
  imageRepository: 'testproject'
  containerRegistry: 'ecommerceproject.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'
  vmImageName: 'ubuntu-latest'
  SONAR_PROJECT_KEY: 'flask-app'
  SONAR_PROJECT_NAME: 'flask-app'

stages:

# =====================================================
# STAGE 1: CODE QUALITY + TEST
# =====================================================
- stage: Quality
  displayName: SonarQube + Unit Tests
  jobs:
  - job: QualityJob
    pool:
      vmImage: $(vmImageName)

    steps:

    - checkout: self

    # Python setup
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'

    - script: python -m pip install --upgrade pip
      displayName: Upgrade pip

    - script: |
        pip install -r requirements.txt
        pip install pytest
        pip install sonar-scanner-cli
      displayName: Install Dependencies

    # 🔥 SONARQUBE PREPARE
    - task: SonarQubePrepare@5
      inputs:
        SonarQube: 'SonarQube-Service-Connection'   # 👈 change name
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: $(SONAR_PROJECT_KEY)
        cliProjectName: $(SONAR_PROJECT_NAME)
        cliSources: '.'

    # Run tests
    - script: pytest --junitxml=test-results.xml
      displayName: Run Unit Tests

    # Publish test results
    - task: PublishTestResults@2
      inputs:
        testResultsFiles: 'test-results.xml'
      condition: succeededOrFailed()

    # 🔥 SONAR ANALYZE
    - task: SonarQubeAnalyze@5

    # 🔥 SONAR PUBLISH
    - task: SonarQubePublish@5
      inputs:
        pollingTimeoutSec: '300'


# =====================================================
# STAGE 2: BUILD & PUSH
# =====================================================
- stage: Build
  dependsOn: Quality
  condition: succeeded()

  jobs:
  - job: BuildJob
    pool:
      vmImage: $(vmImageName)

    steps:
    - checkout: self

    - script: docker build -t $(imageRepository):$(tag) .
      displayName: Build Image

    - task: Docker@2
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)


# =====================================================
# STAGE 3: RUN & VALIDATE
# =====================================================
- stage: Run
  dependsOn: Build

  jobs:
  - job: RunJob
    pool:
      vmImage: $(vmImageName)

    steps:

    # 🔥 LOGIN FIX
    - task: Docker@2
      inputs:
        command: login
        containerRegistry: $(dockerRegistryServiceConnection)

    - script: docker pull $(containerRegistry)/$(imageRepository):$(tag)
      displayName: Pull Image

    - script: docker run -d -p 5000:5000 $(containerRegistry)/$(imageRepository):$(tag)
      displayName: Run Container

    - script: sleep 20
      displayName: Wait

    - script: curl http://localhost:5000
      displayName: Test App

      


  

    
